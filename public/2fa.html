<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KnowledgeHUB&#8482; — Two-Factor Authentication</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --blue:#003768; --orange:#fcb034; --accent:#2e99d5; --grey:#6b7c8f; --light:#f5f7fa; --border:#e8ecf0; --dark:#1a2a3a; }
    body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; background: #f5f7fa; overflow: hidden; }
    .page-wrap { position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px; }
    .card { background:#fff;border-radius:12px;padding:48px 44px 40px;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,.12);position:relative; }
    .logo-area { text-align:center;margin-bottom:32px; }
    h1 { font-size:22px;font-weight:700;color:var(--dark);margin-bottom:6px; }
    .subtitle { font-size:14px;color:var(--grey);margin-bottom:28px;line-height:1.5; }
    label { display:block;font-size:13px;font-weight:600;color:var(--dark);margin-bottom:6px; }
    input[type="text"] { width:100%;padding:14px;border:1.5px solid var(--border);border-radius:8px;font-size:22px;color:var(--dark);background:var(--light);outline:none;font-family:monospace;text-align:center;letter-spacing:6px;transition:border-color .15s; }
    input[type="text"]:focus { border-color:var(--accent);background:#fff; }
    .input-wrap { margin-bottom:20px; }
    .trust-row { display:flex;align-items:center;gap:10px;margin-bottom:24px;cursor:pointer; }
    .trust-row input[type="checkbox"] { width:16px;height:16px;accent-color:var(--blue);flex-shrink:0;cursor:pointer; }
    .trust-row span { font-size:13px;color:var(--grey);line-height:1.4;cursor:pointer; }
    .btn { width:100%;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s; }
    .btn:hover { background:#004a8a; }
    .btn:disabled { background:#9aafbf;cursor:not-allowed; }
    .msg { border-radius:7px;padding:10px 14px;font-size:13px;margin-bottom:18px; }
    .msg.error { background:#fff0f0;border:1px solid #ffcccc;color:#c00; }
    .back { text-align:center;margin-top:18px; }
    .back a { font-size:13px;color:var(--grey);text-decoration:none; }
    .back a:hover { color:var(--blue); }
    .icon-wrap { display:flex;justify-content:center;margin-bottom:20px; }
    .icon-wrap svg { color:var(--blue); }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<svg style="position:fixed;inset:0;width:100vw;height:100vh;pointer-events:none;z-index:0;" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <path d="M 1445.242188 1080 L 1920 1080 L 1920 605.242188 Z" fill="#fcb034"/>
  <path d="M 966.332031 1080 L 1919.847656 1080 L 1443.089844 603.242188 Z" fill="#003768"/>
</svg>

<div class="page-wrap">
  <div class="card">
    <div class="logo-area">
      <img src="/public-logo" alt="Finance Planning Group" style="height:56px;object-fit:contain;margin-bottom:8px;">
      <div style="font-size:11px;color:var(--grey);letter-spacing:.5px;text-transform:uppercase;margin-top:4px;">KnowledgeHUB&#8482;</div>
    </div>

    <div class="icon-wrap">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="11" width="14" height="10" rx="2"/>
        <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
      </svg>
    </div>

    <h1 style="text-align:center;">Two-factor authentication</h1>
    <p class="subtitle" style="text-align:center;">Enter the 6-digit code from your authenticator app.</p>

    <div id="msg" class="msg error" style="display:none;"></div>

    <div class="input-wrap">
      <label for="code">Verification code</label>
      <input type="text" id="code" inputmode="numeric" maxlength="6" placeholder="000000" autocomplete="one-time-code">
    </div>

    <label class="trust-row" for="trust">
      <input type="checkbox" id="trust">
      <span>Remember this device for 30 days</span>
    </label>

    <button class="btn" id="submit-btn" onclick="verify()">Verify</button>

    <div class="back"><a href="/logout">← Use a different account</a></div>
  </div>
</div>

<script>
  var codeInput = document.getElementById('code');
  var msgEl = document.getElementById('msg');
  var btn = document.getElementById('submit-btn');

  // Auto-submit when 6 digits entered
  codeInput.addEventListener('input', function() {
    this.value = this.value.replace(/\D/g, '').slice(0, 6);
    if (this.value.length === 6) verify();
  });

  codeInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') verify();
  });

  codeInput.focus();

  async function verify() {
    var code = codeInput.value.trim();
    if (code.length !== 6) {
      msgEl.textContent = 'Please enter the full 6-digit code.';
      msgEl.style.display = 'block';
      return;
    }
    btn.disabled = true;
    btn.textContent = 'Verifying…';
    msgEl.style.display = 'none';
    try {
      var r = await fetch('/api/2fa/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code: code, trustDevice: document.getElementById('trust').checked })
      });
      var data = await r.json();
      if (r.ok && data.ok) {
        location.href = data.redirect || '/';
      } else {
        msgEl.textContent = data.error || 'Verification failed.';
        msgEl.style.display = 'block';
        codeInput.value = '';
        codeInput.focus();
        btn.disabled = false;
        btn.textContent = 'Verify';
      }
    } catch(err) {
      msgEl.textContent = 'Could not verify — please try again.';
      msgEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Verify';
    }
  }
</script>
</body>
</html>
