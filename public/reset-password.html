<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPG Knowledge Hub — Set New Password</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --blue:#003768; --orange:#fcb034; --accent:#2e99d5; --grey:#6b7c8f; --light:#f5f7fa; --border:#e8ecf0; --dark:#1a2a3a; }
    body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; background: #f5f7fa; overflow: hidden; }
    .page-wrap { position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px; }
    .card { background:#fff;border-radius:12px;padding:48px 44px 40px;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,.12);position:relative; }
    .logo-area { text-align:center;margin-bottom:32px; }
    h1 { font-size:22px;font-weight:700;color:var(--dark);margin-bottom:6px; }
    .subtitle { font-size:14px;color:var(--grey);margin-bottom:28px; }
    label { display:block;font-size:13px;font-weight:600;color:var(--dark);margin-bottom:6px; }
    input[type="password"] { width:100%;padding:12px 44px 12px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;color:var(--dark);background:var(--light);outline:none;font-family:inherit;transition:border-color .15s; }
    input[type="password"]:focus { border-color:var(--accent);background:#fff; }
    .input-wrap { position:relative;margin-bottom:20px; }
    .toggle-pw { position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--grey);padding:4px;display:flex; }
    .btn { width:100%;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s; }
    .btn:hover { background:#004a8a; }
    .btn:disabled { background:#9aafbf;cursor:not-allowed; }
    .msg { border-radius:7px;padding:10px 14px;font-size:13px;margin-bottom:18px; }
    .msg.success { background:#f0fff4;border:1px solid #9ae6b4;color:#276749; }
    .msg.error   { background:#fff0f0;border:1px solid #ffcccc;color:#c00; }
    .back { text-align:center;margin-top:18px; }
    .back a { font-size:13px;color:var(--grey);text-decoration:none; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<svg style="position:fixed;inset:0;width:100vw;height:100vh;pointer-events:none;z-index:0;" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <path d="M 1445.242188 1080 L 1920 1080 L 1920 605.242188 Z" fill="#fcb034"/>
  <path d="M 966.332031 1080 L 1919.847656 1080 L 1443.089844 603.242188 Z" fill="#003768"/>
</svg>

<div class="page-wrap">
  <div class="card">
    <div class="logo-area">
      <img src="/public-logo" alt="Finance Planning Group" style="height:56px;object-fit:contain;margin-bottom:8px;">
      <div style="font-size:11px;color:var(--grey);letter-spacing:.5px;text-transform:uppercase;margin-top:4px;">Knowledge Hub</div>
    </div>

    <div id="invalid-token" style="display:none;">
      <h1>Link expired</h1>
      <p class="subtitle">This reset link has expired or has already been used.</p>
      <a href="/forgot-password" class="btn" style="display:block;text-align:center;text-decoration:none;padding:13px;">Request a new link</a>
    </div>

    <div id="reset-form-wrap">
      <h1>Set new password</h1>
      <p class="subtitle">Choose a strong password — minimum 12 characters.</p>

      <div id="msg" class="msg" style="display:none;"></div>

      <form id="form">
        <label for="password">New Password</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="New password" autocomplete="new-password">
          <button type="button" class="toggle-pw" onclick="togglePw('password')" aria-label="Show password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <label for="confirm">Confirm Password</label>
        <div class="input-wrap">
          <input type="password" id="confirm" placeholder="Confirm password" autocomplete="new-password">
          <button type="button" class="toggle-pw" onclick="togglePw('confirm')" aria-label="Show password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <button type="submit" class="btn" id="submit-btn">Set Password</button>
      </form>
    </div>

    <div class="back"><a href="/login">← Back to sign in</a></div>
  </div>
</div>

<script>
  var token = new URLSearchParams(location.search).get('token');
  if (!token) {
    document.getElementById('reset-form-wrap').style.display = 'none';
    document.getElementById('invalid-token').style.display = 'block';
  }

  function togglePw(id) {
    var inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  document.getElementById('form').addEventListener('submit', async function(e) {
    e.preventDefault();
    var btn    = document.getElementById('submit-btn');
    var msg    = document.getElementById('msg');
    var pw     = document.getElementById('password').value;
    var confirm = document.getElementById('confirm').value;

    msg.style.display = 'none';
    if (pw.length < 12) {
      msg.className = 'msg error'; msg.textContent = 'Password must be at least 12 characters.'; msg.style.display = 'block'; return;
    }
    if (pw !== confirm) {
      msg.className = 'msg error'; msg.textContent = 'Passwords do not match.'; msg.style.display = 'block'; return;
    }
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      var r = await fetch('/api/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password: pw })
      });
      var data = await r.json();
      if (r.ok) {
        msg.className = 'msg success';
        msg.textContent = 'Password updated! Redirecting to sign in…';
        msg.style.display = 'block';
        document.getElementById('form').style.display = 'none';
        setTimeout(function(){ location.href = '/login'; }, 2000);
      } else if (r.status === 400 && data.error && data.error.includes('expired')) {
        document.getElementById('reset-form-wrap').style.display = 'none';
        document.getElementById('invalid-token').style.display = 'block';
      } else {
        msg.className = 'msg error'; msg.textContent = data.error || 'Something went wrong.'; msg.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Set Password';
      }
    } catch(err) {
      msg.className = 'msg error'; msg.textContent = 'Could not reset password. Please try again.'; msg.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Set Password';
    }
  });
</script>
</body>
</html>
