<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPG Knowledge Hub — Reset Password</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --blue:#003768; --orange:#fcb034; --accent:#2e99d5; --grey:#6b7c8f; --light:#f5f7fa; --border:#e8ecf0; --dark:#1a2a3a; }
    body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; background: #f5f7fa; overflow: hidden; }
    .page-wrap { position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px; }
    .card { background:#fff;border-radius:12px;padding:48px 44px 40px;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,.12);position:relative; }
    .logo-area { text-align:center;margin-bottom:32px; }
    h1 { font-size:22px;font-weight:700;color:var(--dark);margin-bottom:6px; }
    .subtitle { font-size:14px;color:var(--grey);margin-bottom:28px;line-height:1.5; }
    label { display:block;font-size:13px;font-weight:600;color:var(--dark);margin-bottom:6px; }
    input[type="email"] { width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;color:var(--dark);background:var(--light);outline:none;font-family:inherit;transition:border-color .15s; }
    input[type="email"]:focus { border-color:var(--accent);background:#fff; }
    .input-wrap { margin-bottom:20px; }
    .btn { width:100%;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s; }
    .btn:hover { background:#004a8a; }
    .btn:disabled { background:#9aafbf;cursor:not-allowed; }
    .msg { border-radius:7px;padding:10px 14px;font-size:13px;margin-bottom:18px; }
    .msg.success { background:#f0fff4;border:1px solid #9ae6b4;color:#276749; }
    .msg.error   { background:#fff0f0;border:1px solid #ffcccc;color:#c00; }
    .back { text-align:center;margin-top:18px; }
    .back a { font-size:13px;color:var(--grey);text-decoration:none; }
    .back a:hover { color:var(--blue); }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<svg style="position:fixed;inset:0;width:100vw;height:100vh;pointer-events:none;z-index:0;" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <path d="M 1445.242188 1080 L 1920 1080 L 1920 605.242188 Z" fill="#fcb034"/>
  <path d="M 966.332031 1080 L 1919.847656 1080 L 1443.089844 603.242188 Z" fill="#003768"/>
</svg>

<div class="page-wrap">
  <div class="card">
    <div class="logo-area">
      <img src="/public-logo" alt="Finance Planning Group" style="height:56px;object-fit:contain;margin-bottom:8px;">
      <div style="font-size:11px;color:var(--grey);letter-spacing:.5px;text-transform:uppercase;margin-top:4px;">Knowledge Hub</div>
    </div>

    <h1>Forgot password?</h1>
    <p class="subtitle">Enter your email and we'll send you a reset link valid for 1 hour.</p>

    <div id="msg" class="msg" style="display:none;"></div>

    <form id="form">
      <label for="email">Email Address</label>
      <div class="input-wrap">
        <input type="email" id="email" name="email" placeholder="your@email.com" autofocus autocomplete="email">
      </div>
      <button type="submit" class="btn" id="submit-btn">Send Reset Link</button>
    </form>

    <div class="back"><a href="/login">← Back to sign in</a></div>
  </div>
</div>

<script>
  document.getElementById('form').addEventListener('submit', async function(e) {
    e.preventDefault();
    var btn = document.getElementById('submit-btn');
    var msg = document.getElementById('msg');
    var email = document.getElementById('email').value.trim();
    if (!email) return;
    btn.disabled = true;
    btn.textContent = 'Sending…';
    msg.style.display = 'none';
    try {
      var r = await fetch('/api/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      var data = await r.json();
      if (r.ok) {
        msg.className = 'msg success';
        msg.textContent = 'If that email is registered, a reset link has been sent. Check your inbox.';
        msg.style.display = 'block';
        document.getElementById('form').style.display = 'none';
      } else {
        msg.className = 'msg error';
        msg.textContent = data.error || 'Something went wrong. Please try again.';
        msg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
      }
    } catch(err) {
      msg.className = 'msg error';
      msg.textContent = 'Could not send email. Please try again.';
      msg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Send Reset Link';
    }
  });
</script>
</body>
</html>
